name: Setup devenv
description: Install Nix, configure Cachix devenv cache, and install devenv

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31

    - uses: cachix/cachix-action@v17
      with:
        name: devenv

    - name: Install devenv
      shell: bash
      run: nix profile add nixpkgs#devenv
